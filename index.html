<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ペコリッチAI相談</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root {
  --primary:    #E8621A;
  --primary-dk: #C4501A;
  --primary-lt: #FFF0E8;
  --green:      #3D9970;
  --green-dk:   #2D7A5A;
  --bg:         #F5F0E8;
  --panel:      #FFFFFF;
  --text:       #1A1A1A;
  --text-sub:   #666666;
  --border:     #E5DDD0;
  --radius:     16px;
  --shadow:     0 2px 12px rgba(0,0,0,0.08);
}
*{margin:0;padding:0;box-sizing:border-box;}
html,body{height:100%;font-family:'Noto Sans JP',sans-serif;background:var(--bg);color:var(--text);overflow:hidden;}

/* ヘッダー */
#chat-header {
  background: var(--panel);
  padding: 10px 16px;
  display: flex;
  align-items: center;
  gap: 10px;
  border-bottom: 1px solid var(--border);
  box-shadow: var(--shadow);
  flex-shrink: 0;
}
#chat-header img { height: 28px; width: auto; }
#chat-header .title {
  font-size: 13px;
  font-weight: 700;
  color: var(--primary);
  margin-left: 4px;
}
#chat-header .status {
  margin-left: auto;
  display: flex;
  align-items: center;
  gap: 5px;
  font-size: 11px;
  color: var(--text-sub);
}
#chat-header .dot {
  width: 7px; height: 7px;
  border-radius: 50%;
  background: var(--green);
  animation: pulse 2s infinite;
}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:0.4;}}

/* 同期バー */
#sync-bar {
  padding: 5px 14px;
  font-size: 11px;
  color: var(--text-sub);
  background: #FFF8F3;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  gap: 5px;
  flex-shrink: 0;
}
#sync-bar.ok { background: #F0FAF5; color: var(--green-dk); }
#sync-bar.error { background: #FFF0F0; color: #C0392B; }

/* チャットエリア */
#chat-wrap { display: flex; flex-direction: column; height: 100%; }
#chat-messages {
  flex: 1;
  overflow-y: auto;
  padding: 16px;
  display: flex;
  flex-direction: column;
  gap: 12px;
  scroll-behavior: smooth;
}

/* メッセージ */
.msg { display: flex; align-items: flex-end; gap: 8px; animation: fadeUp 0.2s ease; }
@keyframes fadeUp{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:translateY(0);}}
.msg.bot  { flex-direction: row; }
.msg.user { flex-direction: row-reverse; }

.avatar {
  width: 34px; height: 34px;
  border-radius: 50%;
  background: var(--primary-lt);
  border: 2px solid var(--primary);
  display: flex; align-items: center; justify-content: center;
  font-size: 16px; flex-shrink: 0;
}

.bubble {
  max-width: 78%;
  padding: 11px 15px;
  border-radius: var(--radius);
  line-height: 1.65;
  font-size: 13.5px;
}
.msg.bot .bubble {
  background: var(--panel);
  border: 1px solid var(--border);
  border-bottom-left-radius: 4px;
  box-shadow: var(--shadow);
  color: var(--text);
}
.msg.user .bubble {
  background: var(--primary);
  border-bottom-right-radius: 4px;
  color: white;
}

/* タイピング */
.typing-dots span {
  display: inline-block; width: 6px; height: 6px;
  border-radius: 50%; background: #CCBBAA;
  margin: 0 2px; animation: blink 1.2s infinite;
}
.typing-dots span:nth-child(2){animation-delay:0.2s;}
.typing-dots span:nth-child(3){animation-delay:0.4s;}
@keyframes blink{0%,80%,100%{transform:scale(0.8);opacity:0.5;}40%{transform:scale(1.2);opacity:1;}}

/* 求人カード */
.job-card {
  background: var(--panel);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 12px 14px;
  margin-top: 8px;
  box-shadow: var(--shadow);
  cursor: pointer;
  transition: transform 0.15s, box-shadow 0.15s;
}
.job-card:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(0,0,0,0.12); }
.job-card .job-title {
  font-size: 13px; font-weight: 700;
  color: var(--primary); margin-bottom: 5px;
}
.job-card .job-meta {
  font-size: 11.5px; color: var(--text-sub);
  display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 6px;
}
.tag {
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 20px; padding: 2px 9px;
  font-size: 11px; color: var(--text-sub);
}
.tag.salary {
  background: #FFF8E8; border-color: #F5C842;
  color: #B07000; font-weight: 700;
}
.apply-btn {
  display: inline-block;
  background: var(--primary);
  color: white; padding: 6px 16px;
  border-radius: 20px; font-size: 12px;
  font-weight: 700; text-decoration: none;
  margin-top: 4px; transition: background 0.15s;
}
.apply-btn:hover { background: var(--primary-dk); }

/* クイック返信 */
.quick-replies { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 10px; }
.quick-btn {
  background: var(--panel);
  border: 1.5px solid var(--primary);
  color: var(--primary);
  border-radius: 20px; padding: 6px 14px;
  font-size: 12px; font-weight: 500;
  font-family: 'Noto Sans JP', sans-serif;
  cursor: pointer; transition: all 0.15s;
}
.quick-btn:hover { background: var(--primary); color: white; }

/* 入力エリア */
#chat-input-area {
  border-top: 1px solid var(--border);
  padding: 10px 12px;
  background: var(--panel);
  display: flex; gap: 8px; align-items: flex-end;
  flex-shrink: 0;
}
#chat-input {
  flex: 1;
  border: 1.5px solid var(--border);
  border-radius: 22px;
  padding: 10px 16px;
  font-family: 'Noto Sans JP', sans-serif;
  font-size: 13.5px; color: var(--text);
  background: var(--bg);
  outline: none; resize: none;
  max-height: 80px; line-height: 1.5;
  transition: border-color 0.2s;
}
#chat-input:focus { border-color: var(--primary); }
#chat-input::placeholder { color: #BBB0A0; }

#send-btn {
  width: 42px; height: 42px;
  border-radius: 50%;
  background: var(--primary);
  border: none; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
  transition: background 0.15s, transform 0.1s;
  box-shadow: 0 2px 8px rgba(232,98,26,0.35);
}
#send-btn:hover  { background: var(--primary-dk); }
#send-btn:active { transform: scale(0.92); }
#send-btn svg { fill: white; width: 18px; height: 18px; }
#send-btn:disabled { background: #CCC; box-shadow: none; cursor: not-allowed; }

/* ローディング */
#loading-screen {
  position: fixed; inset: 0;
  background: #FFFFFF;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 14px; z-index: 999;
}
#loading-screen .logo-wrap img { height: 36px; width: auto; }
#loading-screen .spin {
  width: 32px; height: 32px;
  border: 3px solid var(--border);
  border-top-color: var(--primary);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg);}}
#loading-screen p { font-size: 13px; color: var(--text-sub); }
</style>
</head>

};

function makeChip(val, label, group) {
  return '<label id="chip-'+group+'-'+esc(val)+'" style="'+S.chip+'" onclick="toggleChip(this,\''+group+'\')"><input type="checkbox" value="'+esc(val)+'" style="display:none">'+esc(label)+'</label>';
}

function toggleChip(el, group) {
  var cb = el.querySelector('input');
  cb.checked = !cb.checked;
  el.style.cssText = S.chip + (cb.checked ? S.chipOn : '');
  updateSelectionCount(group);
}

function toggleRow(el) {
  var cb = el.querySelector('input');
  cb.checked = !cb.checked;
  el.style.cssText = S.row + (cb.checked ? S.rowOn : '');
}

function getCheckedFrom(containerId) {
  var el = document.getElementById(containerId);
  if (!el) return [];
  var result = [];
  el.querySelectorAll('input[type=checkbox]:checked').forEach(function(c){ result.push(c.value); });
  return result;
}

function updateSelectionCount(group) {
  var el = document.getElementById('count-'+group);
  if (!el) return;
  var bubbles = document.querySelectorAll('.msg.bot .bubble');
  if (!bubbles.length) return;
  var last = bubbles[bubbles.length-1];
  var chips = last.querySelectorAll('input[type=checkbox]:checked');
  el.textContent = chips.length > 0 ? chips.length + '件選択中' : '';
}

// ======== 検索URLを生成 ========
function buildSearchUrl() {
  var params = [];
  SEL.prefs.forEach(function(p){ if(PREF_CODE[p]) params.push('pref[]='+PREF_CODE[p]); });
  SEL.employment.forEach(function(e){ params.push('workstyle[]='+e); });
  SEL.jobTypes.forEach(function(j){ params.push('option[1][]='+j); });
  SEL.shifts.forEach(function(s){ params.push('option[3][]='+s); });
  SEL.features.forEach(function(f){ params.push('option[4][]='+f); });
  return SEARCH_BASE + (params.length ? '?'+params.join('&') : '');
}

// ======== 求人データ取得 ========
function fetchJobs(force) {
  var now=Date.now(), cached=localStorage.getItem(CACHE_KEY),
      cachedAt=parseInt(localStorage.getItem(CACHE_TIME)||'0'), ageMin=(now-cachedAt)/60000;
  if (!force && cached && ageMin<CACHE_MIN) {
    JOB_DATA=JSON.parse(cached); setSyncBar('ok','求人データ取得済み（'+Math.floor(ageMin)+'分前に更新）');
    return Promise.resolve(JOB_DATA);
  }
  setSyncBar('','最新求人データを取得中…');
  return fetch(WIXBASE+'/getJobs').then(function(r){return r.json();})
    .then(function(d){
      JOB_DATA=d.jobs||[];
      localStorage.setItem(CACHE_KEY,JSON.stringify(JOB_DATA));
      localStorage.setItem(CACHE_TIME,String(Date.now()));
      setSyncBar('ok','求人'+JOB_DATA.length+'件 ('+new Date().toLocaleTimeString('ja-JP')+')');
      return JOB_DATA;
    }).catch(function(){
      if (cached){JOB_DATA=JSON.parse(cached);setSyncBar('error','キャッシュ使用中 ('+JOB_DATA.length+'件)');}
      else{JOB_DATA=sampleJobs();setSyncBar('error','サンプルデータを表示中');}
      return JOB_DATA;
    });
}

function setSyncBar(s,t){
  document.getElementById('sync-bar').className=s;
  document.getElementById('sync-msg').textContent=t;
  document.getElementById('job-count-label').textContent=s==='ok'?'求人 '+JOB_DATA.length+'件':'—';
}

// ======== 求人絞り込み ========
function filterJobsByConditions() {
  var empNames = SEL.employment.map(function(c){ return EMPLOY_CATEGORIES.find(function(e){return e.code===c;}); }).filter(Boolean).map(function(e){return e.name;});
  var jobNames = SEL.jobTypes.map(function(c){ return JOB_CATEGORIES.find(function(j){return j.code===c;}); }).filter(Boolean).map(function(j){return j.name;});

  return JOB_DATA.filter(function(j){
    var text=[j.title,j.company,j.area,j.pref,j.city,j.station,j.jobType,j.employment,j.features,j.genre].join(' ').toLowerCase();

    // エリア
    if (SEL.prefs.length) {
      var pm=SEL.prefs.some(function(p){return text.indexOf(p.replace(/[都道府県]/g,'').toLowerCase())>=0;});
      if (!pm) {
        var cm=SEL.cities.length&&SEL.cities.some(function(c){return text.indexOf(c.replace(/[市区町村]/g,'').toLowerCase())>=0;});
        var sm=SEL.stations.length&&SEL.stations.some(function(s){return text.indexOf(s.toLowerCase())>=0;});
        if (!cm&&!sm) return false;
      }
    }
    // 雇用形態
    if (empNames.length) {
      var em=empNames.some(function(n){return text.indexOf(n.replace('・パート','').toLowerCase())>=0;});
      if (!em) return false;
    }
    // 職種
    if (jobNames.length) {
      var jm=jobNames.some(function(n){return text.replace(/[・]/g,'').indexOf(n.replace(/[・]/g,'').toLowerCase())>=0;});
      if (!jm) return false;
    }
    return true;
  }).slice(0,20);
}

// ======== AI呼び出し ========
function callAI(msg, matched) {
  var jobList=matched.map(function(j){return{id:j.id,title:j.title,company:j.company,area:j.area||j.pref,jobType:j.jobType,employment:j.employment,salary:j.salaryText,station:j.station,url:j.applyUrl};});
  var sp;
  if (STAGE==='results') {
    sp='あなたはペコリッチの求人検索AIアシスタントです。\n'
      +'マッチした求人:\n'+JSON.stringify(jobList)+'\n\n'
      +(matched.length>0?'最大3件を提案し「いかがでしたか？」と感想を聞いてください。\n':'条件に合う公開求人が見つかりませんでした。\n')
      +'【絶対ルール】面談・会員登録への誘導はしない。\n'
      +'{"message":"150字以内","jobs":[],"quickReplies":[],"hasResults":'+(matched.length>0?'true':'false')+'}';
  } else {
    sp='あなたはペコリッチのAIアシスタントです。ユーザー発言:「'+msg+'\"\n'
      +'・非公開求人/会員登録→showRegisterBtn:true\n・プロ/アドバイザー/相談→showConsultBtn:true\n・違う/合わない→showConsultBtn:true\n'
      +'{"message":"200字以内","jobs":[],"quickReplies":[],"showConsultBtn":false,"showRegisterBtn":false}';
  }
  return fetch(AI_ENDPOINT,{method:'POST',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({model:'claude-haiku-4-5-20251001',max_tokens:1000,system:sp,messages:[{role:'user',content:msg}]})})
    .then(function(r){if(!r.ok)throw new Error('HTTP '+r.status);return r.json();})
    .then(function(d){var raw=(d.content&&d.content[0]&&d.content[0].text)||'';if(!raw)throw new Error('empty');
      try{return JSON.parse(raw.replace(/```json|```/g,'').trim());}catch(e){return{message:raw.slice(0,200),jobs:[],quickReplies:[]};} });
}

// ======== 検索実行 ========
function runSearch() {
  STAGE='results';
  var matched=filterJobsByConditions(), searchUrl=buildSearchUrl(), typing=showTyping();
  callAI('検索結果を表示してください',matched).then(function(r){
    typing.remove();
    var html='';
    if(r.message) html+=esc(r.message).replace(/\n/g,'<br>');
    if(r.jobs&&r.jobs.length) html+=r.jobs.map(jobCard).join('');
    html+='<div style="margin-top:10px;"><a href="'+esc(searchUrl)+'" target="_blank" style="display:block;background:#FFF0E8;border:1.5px solid #E8621A;color:#E8621A;text-align:center;padding:10px 16px;border-radius:10px;font-size:13px;font-weight:700;text-decoration:none;">🔍 該当する他の求人を見る →</a></div>';
    var rep=r.hasResults
      ?['✅ 気に入った求人がある','🔍 条件を変えて再検索','👀 非公開求人も見たい','👨‍💼 プロのアドバイザーに相談']
      :['👀 非公開求人も見たい','👨‍💼 プロのアドバイザーに相談','🔍 条件を変えて再検索'];
    html+=quickRepliesHtml(rep);
    appendMsg('bot',html);
  }).catch(function(){appendMsg('bot','⚠️ エラーが発生しました。');});
}

// ======== 再検索 ========
function resetSearch() {
  SEL={regions:[],prefs:[],cities:[],stations:[],employment:[],jobTypes:[],salary:'',shifts:[],features:[]};
  currentStep=0; STAGE='questioning'; areaSubStep='region';
  appendMsg('bot','条件をリセットしました！🔄<br>もう一度条件を教えてください。<br><br>'+renderRegionSelector());

// ======== メッセージ処理 ========
function handleMessage(text) {
  if(text.indexOf('再検索')>=0||text.indexOf('条件を変え')>=0){resetSearch();return;}
  if(STAGE==='results'){
    STAGE='afterresults';
    var t=showTyping();
    callAI(text,[]).then(function(r){
      t.remove();var html='';
      if(r.message) html+=esc(r.message).replace(/\n/g,'<br>');
      if(r.showConsultBtn) html+=consultBtn();
      var rep=r.quickReplies||[];
      if(rep.indexOf('🔍 条件を変えて再検索')<0)rep.push('🔍 条件を変えて再検索');
      html+=quickRepliesHtml(rep);appendMsg('bot',html);
    }).catch(function(){appendMsg('bot','⚠️ エラーが発生しました。');});
    return;
  }
  if(STAGE==='afterresults'){
    var t2=showTyping();
    callAI(text,[]).then(function(r){
      t2.remove();var html='';
      if(r.message) html+=esc(r.message).replace(/\n/g,'<br>');
      if(r.showConsultBtn) html+=consultBtn();
      var rep=r.quickReplies||[];
      if(rep.indexOf('🔍 条件を変えて再検索')<0)rep.push('🔍 条件を変えて再検索');
      html+=quickRepliesHtml(rep);appendMsg('bot',html);
    }).catch(function(){appendMsg('bot','⚠️ エラーが発生しました。');});
  }
}

function sendMessage(){
  var input=document.getElementById('chat-input'),btn=document.getElementById('send-btn'),text=input.value.trim();

  isSending=true;btn.disabled=true;input.value='';input.style.height='auto';
  if(STAGE==='questioning'){addUserMsg(text);isSending=false;btn.disabled=false;document.getElementById('chat-input').focus();}
