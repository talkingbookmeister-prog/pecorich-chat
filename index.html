<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ペコリッチAI相談</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root {
  --primary:    #E8621A;
  --primary-dk: #C4501A;
  --primary-lt: #FFF0E8;
  --green:      #3D9970;
  --green-dk:   #2D7A5A;
  --bg:         #F5F0E8;
  --panel:      #FFFFFF;
  --text:       #1A1A1A;
  --text-sub:   #666666;
  --border:     #E5DDD0;
  --radius:     16px;
  --shadow:     0 2px 12px rgba(0,0,0,0.08);
}
*{margin:0;padding:0;box-sizing:border-box;}
html,body{height:100%;font-family:'Noto Sans JP',sans-serif;background:var(--bg);color:var(--text);overflow:hidden;}

/* ヘッダー */
#chat-header {
  background: var(--panel);
  padding: 10px 16px;
  display: flex;
  align-items: center;
  gap: 10px;
  border-bottom: 1px solid var(--border);
  box-shadow: var(--shadow);
  flex-shrink: 0;
}
#chat-header img { height: 28px; width: auto; }
#chat-header .title {
  font-size: 13px;
  font-weight: 700;
  color: var(--primary);
  margin-left: 4px;
}
#chat-header .status {
  margin-left: auto;
  display: flex;
  align-items: center;
  gap: 5px;
  font-size: 11px;
  color: var(--text-sub);
}
#chat-header .dot {
  width: 7px; height: 7px;
  border-radius: 50%;
  background: var(--green);
  animation: pulse 2s infinite;
}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:0.4;}}

/* 同期バー */
#sync-bar {
  padding: 5px 14px;
  font-size: 11px;
  color: var(--text-sub);
  background: #FFF8F3;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  gap: 5px;
  flex-shrink: 0;
}
#sync-bar.ok { background: #F0FAF5; color: var(--green-dk); }
#sync-bar.error { background: #FFF0F0; color: #C0392B; }

/* チャットエリア */
#chat-wrap { display: flex; flex-direction: column; height: 100%; }
#chat-messages {
  flex: 1;
  overflow-y: auto;
  padding: 16px;
  display: flex;
  flex-direction: column;
  gap: 12px;
  scroll-behavior: smooth;
}

/* メッセージ */
.msg { display: flex; align-items: flex-end; gap: 8px; animation: fadeUp 0.2s ease; }
@keyframes fadeUp{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:translateY(0);}}
.msg.bot  { flex-direction: row; }
.msg.user { flex-direction: row-reverse; }

.avatar {
  width: 34px; height: 34px;
  border-radius: 50%;
  background: var(--primary-lt);
  border: 2px solid var(--primary);
  display: flex; align-items: center; justify-content: center;
  font-size: 16px; flex-shrink: 0;
}

.bubble {
  max-width: 78%;
  padding: 11px 15px;
  border-radius: var(--radius);
  line-height: 1.65;
  font-size: 13.5px;
}
.msg.bot .bubble {
  background: var(--panel);
  border: 1px solid var(--border);
  border-bottom-left-radius: 4px;
  box-shadow: var(--shadow);
  color: var(--text);
}
.msg.user .bubble {
  background: var(--primary);
  border-bottom-right-radius: 4px;
  color: white;
}

/* タイピング */
.typing-dots span {
  display: inline-block; width: 6px; height: 6px;
  border-radius: 50%; background: #CCBBAA;
  margin: 0 2px; animation: blink 1.2s infinite;
}
.typing-dots span:nth-child(2){animation-delay:0.2s;}
.typing-dots span:nth-child(3){animation-delay:0.4s;}
@keyframes blink{0%,80%,100%{transform:scale(0.8);opacity:0.5;}40%{transform:scale(1.2);opacity:1;}}

/* 求人カード */
.job-card {
  background: var(--panel);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 12px 14px;
  margin-top: 8px;
  box-shadow: var(--shadow);
  cursor: pointer;
  transition: transform 0.15s, box-shadow 0.15s;
}
.job-card:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(0,0,0,0.12); }
.job-card .job-title {
  font-size: 13px; font-weight: 700;
  color: var(--primary); margin-bottom: 5px;
}
.job-card .job-meta {
  font-size: 11.5px; color: var(--text-sub);
  display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 6px;
}
.tag {
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 20px; padding: 2px 9px;
  font-size: 11px; color: var(--text-sub);
}
.tag.salary {
  background: #FFF8E8; border-color: #F5C842;
  color: #B07000; font-weight: 700;
}
.apply-btn {
  display: inline-block;
  background: var(--primary);
  color: white; padding: 6px 16px;
  border-radius: 20px; font-size: 12px;
  font-weight: 700; text-decoration: none;
  margin-top: 4px; transition: background 0.15s;
}
.apply-btn:hover { background: var(--primary-dk); }

/* クイック返信 */
.quick-replies { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 10px; }
.quick-btn {
  background: var(--panel);
  border: 1.5px solid var(--primary);
  color: var(--primary);
  border-radius: 20px; padding: 6px 14px;
  font-size: 12px; font-weight: 500;
  font-family: 'Noto Sans JP', sans-serif;
  cursor: pointer; transition: all 0.15s;
}
.quick-btn:hover { background: var(--primary); color: white; }

/* 入力エリア */
#chat-input-area {
  border-top: 1px solid var(--border);
  padding: 10px 12px;
  background: var(--panel);
  display: flex; gap: 8px; align-items: flex-end;
  flex-shrink: 0;
}
#chat-input {
  flex: 1;
  border: 1.5px solid var(--border);
  border-radius: 22px;
  padding: 10px 16px;
  font-family: 'Noto Sans JP', sans-serif;
  font-size: 13.5px; color: var(--text);
  background: var(--bg);
  outline: none; resize: none;
  max-height: 80px; line-height: 1.5;
  transition: border-color 0.2s;
}
#chat-input:focus { border-color: var(--primary); }
#chat-input::placeholder { color: #BBB0A0; }

#send-btn {
  width: 42px; height: 42px;
  border-radius: 50%;
  background: var(--primary);
  border: none; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
  transition: background 0.15s, transform 0.1s;
  box-shadow: 0 2px 8px rgba(232,98,26,0.35);
}
#send-btn:hover  { background: var(--primary-dk); }
#send-btn:active { transform: scale(0.92); }
#send-btn svg { fill: white; width: 18px; height: 18px; }
#send-btn:disabled { background: #CCC; box-shadow: none; cursor: not-allowed; }

/* ローディング */
#loading-screen {
  position: fixed; inset: 0;
  background: #FFFFFF;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 14px; z-index: 999;
}
#loading-screen .logo-wrap img { height: 36px; width: auto; }
#loading-screen .spin {
  width: 32px; height: 32px;
  border: 3px solid var(--border);
  border-top-color: var(--primary);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg);}}
#loading-screen p { font-size: 13px; color: var(--text-sub); }
</style>
</head>

// ===== UIスタイル定数 =====
var S = {
  chip:   'display:inline-flex;align-items:center;cursor:pointer;padding:7px 12px;border:1.5px solid #E5DDD0;border-radius:20px;background:#FFF;font-size:12.5px;margin:3px;',
  chipOn: 'border-color:#E8621A;background:#FFF0E8;color:#E8621A;font-weight:600;',
  row:    'display:flex;align-items:center;gap:8px;cursor:pointer;padding:9px 12px;border:1.5px solid #E5DDD0;border-radius:10px;background:#FFF;font-size:13px;margin-bottom:5px;',
  rowOn:  'border-color:#E8621A;background:#FFF0E8;',
  btnP:   'padding:10px 16px;border-radius:10px;font-size:13px;font-weight:700;cursor:pointer;border:none;background:#E8621A;color:white;',
  btnB:   'padding:10px 14px;border-radius:10px;font-size:12px;cursor:pointer;background:#F5F0E8;color:#666;border:1px solid #ddd;',
  btnS:   'padding:10px 14px;border-radius:10px;font-size:12px;cursor:pointer;background:#FFF0E8;color:#E8621A;border:1.5px solid #E8621A;'
};

function chip(val, label, group) {
  return '<label data-val="'+esc(val)+'" data-group="'+group+'" style="'+S.chip+'" onclick="toggleChip(this)">'
    +'<input type="checkbox" value="'+esc(val)+'" style="display:none">'+esc(label)+'</label>';
}
function toggleChip(el) {
  var cb = el.querySelector('input');
  cb.checked = !cb.checked;
  el.style.cssText = S.chip + (cb.checked ? S.chipOn : '');
}
function toggleRow(el) {
  var cb = el.querySelector('input');
  cb.checked = !cb.checked;
  el.style.cssText = S.row + (cb.checked ? S.rowOn : '');
}
function getCheckedFrom(id) {
  var el = document.getElementById(id);
  if (!el) return [];
  var r = [];
  el.querySelectorAll('input[type=checkbox]:checked').forEach(function(c){ r.push(c.value); });
  return r;
}
function updateLastBotBubble(html) {
  var b = document.querySelectorAll('.msg.bot .bubble');
  if (b.length) { b[b.length-1].innerHTML = html; scrollBottom(); }
}
function scrollBottom() {
  var a = document.getElementById('chat-messages');
  if (a) a.scrollTop = a.scrollHeight;
}

function renderCitySelector() {
  // pref完全一致でフィルタし、title・company名から市区町村を抽出
  var citySet = {};
  var matchedJobs = JOB_DATA.filter(prefMatches);
  var totalJobs   = matchedJobs.length;

  matchedJobs.forEach(function(j) {
    // ★ cityフィールドを直接使用（GAS v9で正確なデータが入っている）
    if (j.city && j.city.trim() && j.city.trim().length >= 2) {
      var c = j.city.trim();
      citySet[c] = (citySet[c]||0) + 1;
    }
  });

  var cities = Object.keys(citySet).sort(function(a,b){
    return citySet[b] - citySet[a];
  });

  var html = '<div style="font-weight:700;margin-bottom:6px;">市区町村・エリアを選んでください🏙️</div>';

  if (cities.length === 0) {
    html += '<div style="font-size:13px;color:#3D9970;font-weight:700;margin-bottom:8px;">✅ 選択した都道府県の求人が'+totalJobs+'件あります。</div>'
      +'<div style="padding:12px;background:#F0FAF5;border-radius:10px;font-size:13px;color:#2D7A5A;">'
      +'このまま「エリア確定」で次の条件（雇用形態・職種）に進めます。<br>'
      +'市区町村・駅の絞り込みはスキップできます。'
      +'</div>';
  } else {
    html += '<div style="font-size:11px;color:#3D9970;margin-bottom:4px;">✅ 求人データから抽出（'+cities.length+'エリア / 都道府県内'+totalJobs+'件）</div>'
      +'<div style="font-size:11px;color:#aaa;margin-bottom:8px;">複数選択できます</div>'
      +'<div id="city-list" style="display:flex;flex-wrap:wrap;">';
    cities.forEach(function(c) {
      html += '<label style="'+S.chip+'" onclick="toggleChip(this)">'
        +'<input type="checkbox" value="'+esc(c)+'" style="display:none">'
        +esc(c)+'<span style="font-size:10px;color:#bbb;margin-left:3px;">('+citySet[c]+'件)</span></label>';
    });
    html += '</div>'
      +'<div style="margin-top:8px;padding:8px;background:#F5F0E8;border-radius:8px;font-size:11px;color:#888;">'
      +'💡 件数はその市区町村に関連する求人数です。表示されていないエリアは現在求人掲載なし、またはデータ未設定のため省略しています。'
      +'</div>';
  }

  html += '<div style="display:flex;gap:6px;margin-top:10px;">'
    +'<button onclick="backToAreaChoice()" style="'+S.btnB+'">← 戻る</button>'
    +'<button onclick="confirmCities()" style="'+S.btnP+'flex:1;">エリア確定 ✓</button>'
    +'</div>';
  return html;
}

function confirmCities()    { SEL.cities = getCheckedFrom('city-list'); finalizeArea(); }

function renderStationSelector() {
  // pref完全一致でフィルタし、title・company名から駅名を抽出
  var stationSet = {};
  var matchedJobs = JOB_DATA.filter(prefMatches);
  var totalJobs   = matchedJobs.length;

  matchedJobs.forEach(function(j) {
    // ★ stationフィールドを直接使用（GAS v9で正確なデータが入っている）
    if (j.station && j.station.trim()) {
      // 複数駅が「・」区切りで入っている場合を考慮
      var stList = j.station.trim().split(/[・、]/);
      stList.forEach(function(st) {
        st = st.trim().replace(/駅$/,'');
        if (st && st.length >= 2 && st.length <= 10) {
          stationSet[st] = (stationSet[st]||0) + 1;
        }
      });
    }
  });

  var stations = Object.keys(stationSet).sort(function(a,b){
    return stationSet[b] - stationSet[a];
  });

  var html = '<div style="font-weight:700;margin-bottom:6px;">最寄駅・エリアを選んでください🚉</div>';

  if (stations.length === 0) {
    html += '<div style="font-size:13px;color:#3D9970;font-weight:700;margin-bottom:8px;">✅ 選択した都道府県の求人が'+totalJobs+'件あります。</div>'
      +'<div style="padding:12px;background:#F0FAF5;border-radius:10px;font-size:13px;color:#2D7A5A;">'
      +'駅での絞り込みは現在準備中です。<br>'
      +'「スキップ」で次の条件（雇用形態・職種）に進んでください。'
      +'</div>';
  } else {
    html += '<div style="font-size:11px;color:#3D9970;margin-bottom:4px;">✅ 求人データから抽出（'+stations.length+'駅・エリア / 都道府県内'+totalJobs+'件）</div>'
      +'<div style="font-size:11px;color:#aaa;margin-bottom:8px;">複数選択できます</div>'
      +'<div id="station-list" style="display:flex;flex-wrap:wrap;">';
    stations.forEach(function(st) {
      html += '<label style="'+S.chip+'" onclick="toggleChip(this)">'
        +'<input type="checkbox" value="'+esc(st)+'" style="display:none">'
        +esc(st)+'<span style="font-size:10px;color:#bbb;margin-left:3px;">('+stationSet[st]+'件)</span></label>';
    });
    html += '</div>'
      +'<div style="margin-top:8px;padding:8px;background:#F5F0E8;border-radius:8px;font-size:11px;color:#888;">'
      +'💡 表示されていない駅は現在求人掲載なし、またはデータ未設定のため省略しています。'
      +'</div>';
  }

  html += '<div style="display:flex;gap:6px;margin-top:10px;">'
    +'<button onclick="backToAreaChoice()" style="'+S.btnB+'">← 戻る</button>'
    +'<button onclick="skipStation()" style="'+S.btnS+'">スキップ</button>'
    +'<button onclick="confirmStations()" style="'+S.btnP+'flex:1;">エリア確定 ✓</button>'
    +'</div>';
  return html;
}

function skipStation()    { SEL.stations=[]; finalizeArea(); }
function confirmStations(){ SEL.stations = getCheckedFrom('station-list'); finalizeArea(); }

function finalizeArea() {
  var summary = SEL.prefs.join('・');
  if (SEL.cities.length)   summary += ' ／ '+SEL.cities.join('・');
  if (SEL.stations.length) summary += ' ／ '+SEL.stations.join('・')+'駅周辺';

}

  var html = '<div style="font-weight:700;margin-bottom:8px;">お店の特徴はありますか？🏪</div>'
    +'<div style="font-size:11px;color:#aaa;margin-bottom:6px;">複数選択できます</div>'
    +'<div id="store-feature-list" style="display:flex;flex-wrap:wrap;">';
  STORE_FEATURE_LIST.forEach(function(f){ html += chip(f.code, f.name, 'store-feature'); });
  html += '</div><div style="display:flex;gap:6px;margin-top:10px;">'
    +'<button onclick="confirmStoreFeature()" style="'+S.btnP+'flex:1;">この条件で検索する 🔍</button>'
    +'</div>';
  return html;
}

function confirmStoreFeature() {
  var codes = getCheckedFrom('store-feature-list');
  if (codes.indexOf('sf000') >= 0 || !codes.length) { SEL.storeFeatures = []; }
  else { SEL.storeFeatures = codes; }
  var names = SEL.storeFeatures.slice();
  addUserMsg(names.length ? names.join('・') : 'こだわらない');
  FLOW_STEP = 7;
  askFlowStep();
}

// ===== 給与選択（絞り込み⑥） =====
function renderSalarySelector() {
  // 雇用形態に応じて時給 or 月給を切り替え
  var isPartTime = SEL.employment.indexOf('pt') >= 0 ||
                   (SEL.employment.length === 0); // 未選択の場合は両方
  var isFullTime = SEL.employment.indexOf('rs') >= 0;
  var showBoth   = (isPartTime && isFullTime) || SEL.employment.length === 0;

  var html = '<div style="font-weight:700;margin-bottom:8px;">給与の希望はありますか？💴</div>'
    +'<div style="font-size:11px;color:#aaa;margin-bottom:6px;">複数選択できます</div>'
    +'<div id="salary-list" style="display:flex;flex-wrap:wrap;">';

  if (showBoth || isPartTime) {
    html += '<div style="font-size:12px;font-weight:700;color:#666;width:100%;margin:4px 0 2px;">⏱️ 時給</div>';
    ['950円以上','1,000円以上','1,100円以上','1,200円以上','1,300円以上','1,500円以上'].forEach(function(v){
      html += '<label style="'+S.chip+'" onclick="toggleChip(this)">'
        +'<input type="checkbox" value="時給'+v+'" style="display:none">時給 '+v+'</label>';
    });
  }
  if (showBoth || isFullTime) {
    html += '<div style="font-size:12px;font-weight:700;color:#666;width:100%;margin:8px 0 2px;">📅 月給</div>';
    ['20万円以上','22万円以上','25万円以上','28万円以上','30万円以上','35万円以上'].forEach(function(v){
      html += '<label style="'+S.chip+'" onclick="toggleChip(this)">'
        +'<input type="checkbox" value="月給'+v+'" style="display:none">月給 '+v+'</label>';
    });
  }

  html += '</div><div style="display:flex;gap:6px;margin-top:10px;">'
    +'<button onclick="skipSalary()" style="'+S.btnS+'">こだわらない</button>'
    +'<button onclick="confirmSalary()" style="'+S.btnP+'flex:1;">この条件で検索する 🔍</button>'
    +'</div>';
  return html;
}

function skipSalary()    { SEL.salary=''; addUserMsg('こだわらない'); runSearch(true); }
function confirmSalary() {
  var el = document.getElementById('salary-list');
  var checked = [];
  if (el) el.querySelectorAll('input[type=checkbox]:checked').forEach(function(c){ checked.push(c.value); });
  SEL.salary = checked.length ? checked[checked.length-1] : '';
  addUserMsg(SEL.salary || 'こだわらない');
  runSearch(true);
}

// ===== フローステップ管理 =====
function askFlowStep() {
  if (FLOW_STEP === 0) {
    appendMsg('bot', renderRegionSelector());
  } else if (FLOW_STEP === 1) {
    appendMsg('bot', renderEmploymentSelector());
  } else if (FLOW_STEP === 2) {
    appendMsg('bot', renderJobTypeSelector());
  } else if (FLOW_STEP === 3) {
    appendMsg('bot', renderGenreSelector());
  } else if (FLOW_STEP === 4) {
    appendMsg('bot', renderShiftSelector());
  } else if (FLOW_STEP === 5) {
    appendMsg('bot', renderFeatureSelector());
  } else if (FLOW_STEP === 6) {
    appendMsg('bot', renderStoreFeatureSelector());
  } else if (FLOW_STEP === 7) {
    appendMsg('bot', renderSalarySelector());
  }
}

// ===== 求人データ取得 =====
function fetchJobs(force) {
  var now=Date.now(), cached=localStorage.getItem(CACHE_KEY),
      cachedAt=parseInt(localStorage.getItem(CACHE_TIME)||'0'), ageMin=(now-cachedAt)/60000;
  if (!force && cached && ageMin<CACHE_MIN) {
    JOB_DATA=JSON.parse(cached); setSyncBar('ok','求人データ取得済み（'+Math.floor(ageMin)+'分前に更新）');
    return Promise.resolve(JOB_DATA);
  }
  setSyncBar('','最新求人データを取得中…');
  return fetch(WIXBASE+'/getJobs').then(function(r){return r.json();})
    .then(function(d){
      JOB_DATA=d.jobs||[];
      localStorage.setItem(CACHE_KEY,JSON.stringify(JOB_DATA));
      localStorage.setItem(CACHE_TIME,String(Date.now()));
      setSyncBar('ok','求人'+JOB_DATA.length+'件 ('+new Date().toLocaleTimeString('ja-JP')+')');
      return JOB_DATA;
    }).catch(function(){
      if (cached){JOB_DATA=JSON.parse(cached);setSyncBar('error','キャッシュ使用中 ('+JOB_DATA.length+'件)');}
      else{JOB_DATA=sampleJobs();setSyncBar('error','サンプルデータを表示中');}
      return JOB_DATA;
    });
}

function setSyncBar(s,t){
  document.getElementById('sync-bar').className=s;
  document.getElementById('sync-msg').textContent=t;
  document.getElementById('job-count-label').textContent=s==='ok'?'求人 '+JOB_DATA.length+'件':'—';
}

// ===== 求人絞り込み =====
function filterJobs() {
  var empNames = SEL.employment.map(function(c){
    var e=EMPLOY_LIST.find(function(x){return x.code===c;}); return e?e.name:'';
  }).filter(Boolean);
  var jobNames = SEL.jobTypes.map(function(c){
    var j=JOB_LIST.find(function(x){return x.code===c;}); return j?j.name:'';
  }).filter(Boolean);
  // codeがgenre名そのもの（"g00"のこだわらないは除外）
  var genreNames = SEL.genres.filter(function(c){ return c !== 'g00'; });
  var shiftNames = SEL.shifts.filter(function(c){ return c !== "shift000"; });
  // codeがfeature名そのもの（"gf000"のこだわらないは除外）
  var featureNames = SEL.features.filter(function(c){ return c !== 'gf000'; });
  // codeがstoreFeature名そのもの（"sf000"のこだわらないは除外）
  var storeFeatureNames = (SEL.storeFeatures||[]).filter(function(c){ return c !== 'sf000'; });

  return JOB_DATA.filter(function(j){
    var text=[j.title,j.company,j.area,j.pref,j.city,j.station,
              j.jobType,j.employment,j.features,j.genre,j.detail].join(' ').toLowerCase();

    // エリア：フィールド完全一致（テキスト検索廃止）
    if (SEL.prefs.length) {
      // 都道府県：j.prefフィールドで完全一致
      if (!SEL.prefs.some(function(p){ return j.pref === p; })) return false;

      // 市区町村：j.cityフィールドで完全一致
      if (SEL.cities.length) {
        if (!SEL.cities.some(function(c){ return j.city === c; })) return false;
      }

      // 駅：j.stationフィールドで一致（市区町村未選択の場合のみ）
      if (SEL.stations.length && !SEL.cities.length) {
        var stOk = SEL.stations.some(function(s){
          if (!j.station) return false;
          return j.station.split(/[・、]/).some(function(st){
            return st.trim() === s || st.trim().replace(/駅$/, '') === s;
          });
        });
        if (!stOk) return false;
      }
    }
    // 雇用形態
    if (empNames.length) {
      var hasAll = empNames.some(function(n){
        return text.indexOf(n.replace('・パート','').toLowerCase())>=0;
      });
      if (!hasAll) return false;
    }
    // 職種
    if (jobNames.length) {
      var jm=jobNames.some(function(n){
        return text.replace(/[・]/g,'').indexOf(n.replace(/[・]/g,'').toLowerCase())>=0;
      });
      if (!jm) return false;
    }
    // ジャンル（genreフィールドの<>区切り完全一致）
    if (genreNames.length) {
      var jobGenres = (j.genre||'').split('<>');
      var gm = genreNames.some(function(n){
        return jobGenres.indexOf(n) >= 0;
      });
      if (!gm) return false;
    }
    // シフト（shift フィールドの、区切り完全一致）
    if (shiftNames.length) {
      var jobShifts = (j.shift||'').split('、');
      var shm = shiftNames.some(function(n){ return jobShifts.indexOf(n) >= 0; });
      if (!shm) return false;
    }
    // こだわり（featuresフィールドの、区切り完全一致）
    if (featureNames.length) {
      var jobFeatures = (j.features||'').split('、');
      var fm = featureNames.some(function(n){ return jobFeatures.indexOf(n) >= 0; });
      if (!fm) return false;
    }
    // お店の特徴（storeFeaturesフィールドの<>区切り完全一致）
    if (storeFeatureNames.length) {
      var jobSF = (j.storeFeatures||'').split('<>');
      var sfm = storeFeatureNames.some(function(n){ return jobSF.indexOf(n) >= 0; });
      if (!sfm) return false;
    }
    // 給与フィルタ（テキストマッチ）
    if (SEL.salary) {
      var salaryNum = parseInt(SEL.salary.replace(/[^0-9]/g,''));
      var jobSalary = j.salaryMin || j.salaryMax || 0;
      // salaryMinがある場合のみフィルタ（データがない場合は通す）
      if (jobSalary > 0 && salaryNum > 0 && jobSalary < salaryNum) return false;
    }
    return true;
  });
}

// ===== 検索URL生成 =====
function buildSearchUrl() {
  var params=[];
  SEL.prefs.forEach(function(p){ if(PREF_CODE[p]) params.push('pref[]='+PREF_CODE[p]); });
  SEL.employment.forEach(function(e){ params.push('workstyle[]='+e); });
  SEL.jobTypes.forEach(function(j){ params.push('option[1][]='+j); });
  SEL.shifts.forEach(function(s){ params.push('option[3][]='+s); });
  SEL.features.forEach(function(f){ params.push('option[4][]='+f); });
  return SEARCH_BASE+(params.length?'?'+params.join('&'):'');
}

// ===== AI呼び出し =====
function callAI(userMessage, matched) {
  var jobList = matched.slice(0,20).map(function(j){
    return {id:j.id,title:j.title,company:j.company,area:j.area||j.pref,
            jobType:j.jobType,employment:j.employment,salary:j.salaryText,
            station:j.station,url:j.applyUrl};
  });

  var sp;
  if (STAGE==='results') {
    sp = 'あなたはペコリッチの求人検索AIアシスタントです。\n'
      +'マッチした求人:\n'+JSON.stringify(jobList)+'\n\n'
      +(matched.length>0?'最大3件を自然な文章で提案し、最後に「いかがでしたか？」と感想を聞いてください。\n':'条件に合う公開求人が見つかりませんでした。非公開求人の可能性を示唆してください。\n')
      +'【絶対ルール】面談・会員登録への誘導は絶対しない。\n'
      +'{"message":"150字以内","jobs":[],"quickReplies":[],"hasResults":'+(matched.length>0?'true':'false')+'}';
  } else {
    sp = 'あなたはペコリッチのAIアシスタントです。ユーザー発言:「'+userMessage+'\"\n\n'
      +'対応ルール:\n'
      +'・「気に入った」「応募したい」「良さそう」→ プロのサポートで面接成功率アップを訴求（showConsultBtn:true）\n'
      +'・「非公開求人」「もっと見たい」→ 非公開求人が多数あることを強調（showConsultBtn:true）\n'
      +'・「違う」「合わない」「ない」→ 非公開求人の存在と無料相談を強調（showConsultBtn:true）\n'
      +'【絶対ルール】会員登録ボタンは出さない。面談→その後登録案内の流れ。\n'
      +'{"message":"200字以内","jobs":[],"quickReplies":[],"showConsultBtn":false}';
  }

  return fetch(AI_ENDPOINT,{method:'POST',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({model:'claude-haiku-4-5-20251001',max_tokens:800,system:sp,
      messages:[{role:'user',content:userMessage}]})})
    .then(function(r){if(!r.ok)throw new Error('HTTP '+r.status);return r.json();})
    .then(function(d){
      var raw=(d.content&&d.content[0]&&d.content[0].text)||'';
      if(!raw) throw new Error('empty');
      try{return JSON.parse(raw.replace(/```json|```/g,'').trim());}
      catch(e){return{message:raw.slice(0,200),jobs:[],quickReplies:[]};}
    });
}

// ===== 検索実行 =====
function runSearch(isFinal) {
  STAGE = 'results';
  var matched  = filterJobs();
  var searchUrl = buildSearchUrl();

  // 件数が多い場合で、初回検索の場合 → 絞り込みへ
  if (!isFinal && matched.length > REFINE_THRESHOLD) {
    appendMsg('bot',
      '<div style="font-size:13px;color:#E8621A;font-weight:700;margin-bottom:4px;">🔍 '+matched.length+'件見つかりました！</div>'
      +'件数が多いので、さらに条件を絞り込みましょう。<br>'
      +'スキップして今すぐ結果を見ることもできます。'
      +'<div style="display:flex;gap:8px;margin-top:10px;">'
      +'<button onclick="skipRefineAll(\''+esc(searchUrl)+'\')" style="'+S.btnS+'flex:1;">今の条件で結果を見る</button>'
      +'<button onclick="startRefine()" style="'+S.btnP+'flex:1;">絞り込む →</button>'
      +'</div>');
    return;
  }

  // 件数0件の場合
  if (matched.length === 0) {
    showNoResults(searchUrl);
    return;
  }

  // 通常の検索結果表示
  showResults(matched, searchUrl);
}

function startRefine() {
  FLOW_STEP = 3;
  askFlowStep();
}

function skipRefineAll(searchUrl) {
  var matched = filterJobs();
  showResults(matched, searchUrl);
}

function showNoResults(searchUrl) {
  STAGE = 'afterresults';
  var html = '😢 ご指定の条件に合う公開求人が見つかりませんでした。<br><br>'
    +'<strong>でも、諦めないでください！</strong><br>'
    +'実はペコリッチには一般公開していない<strong>非公開求人が多数</strong>あります。'
    +'プロのアドバイザーがご希望に合う求人を直接ご紹介できます。'
    +consultBtn()
    +'<div style="margin-top:10px;"><a href="'+esc(searchUrl)+'" target="_blank" style="display:block;background:#F5F0E8;border:1px solid #ddd;color:#666;text-align:center;padding:10px;border-radius:10px;font-size:12px;text-decoration:none;">🔍 条件を広げてpecorich.jpで探す</a></div>'
    +quickRepliesHtml(['🔍 条件を変えて再検索']);
  appendMsg('bot', html);
}

function showResults(matched, searchUrl) {
  STAGE = 'results';

  // AIを使わずローカルで直接表示（高速・安定）
  var html = '';
  var count = matched.length;

  if (count > 0) {
    html += '<div style="font-size:12px;color:#3D9970;font-weight:700;margin-bottom:8px;">✅ '+count+'件の求人が見つかりました！</div>';
    matched.slice(0, 3).forEach(function(j){ html += jobCard(j); });
  } else {
    html += '😢 条件に合う公開求人が見つかりませんでした。';
  }

  html += '<div style="margin-top:10px;">'
    +'<a href="'+esc(searchUrl)+'" target="_blank" style="'
    +'display:block;background:#FFF0E8;border:1.5px solid #E8621A;'
    +'color:#E8621A;text-align:center;padding:10px 16px;border-radius:10px;'
    +'font-size:13px;font-weight:700;text-decoration:none;">'
    +'🔍 該当する求人をすべて見る（'+count+'件）→</a></div>';

  html += '<div style="margin-top:10px;font-size:13px;color:#666;">いかがでしたか？</div>';

  var rep = count > 0
    ? ['✅ 気に入った求人がある','👀 非公開求人も見たい','👨‍💼 プロのアドバイザーに相談','🔍 条件を変えて再検索']
    : ['👀 非公開求人も見たい','👨‍💼 プロのアドバイザーに相談','🔍 条件を変えて再検索'];
  html += quickRepliesHtml(rep);
  appendMsg('bot', html);
}

// ===== 再検索 =====
function resetSearch() {
  SEL={prefs:[],cities:[],stations:[],employment:[],jobTypes:[],genres:[],shifts:[],features:[],storeFeatures:[]};
  FLOW_STEP=0; STAGE='questioning'; selectedRegions=[];
  appendMsg('bot','条件をリセットしました！🔄<br>もう一度条件を教えてください。<br><br>'+renderRegionSelector());
}

// ===== メッセージ処理 =====
function handleMessage(text) {
  if (text.indexOf('再検索')>=0||text.indexOf('条件を変え')>=0) { resetSearch(); return; }
  if (STAGE==='results') {
    STAGE='afterresults';
    var t=showTyping();
    callAI(text,[]).then(function(r){
      t.remove();
      var html='';
      if(r.message) html+=esc(r.message).replace(/\n/g,'<br>');
      if(r.showConsultBtn) html+=consultBtn();
      var rep=r.quickReplies||[];
      if(rep.indexOf('🔍 条件を変えて再検索')<0) rep.push('🔍 条件を変えて再検索');
      html+=quickRepliesHtml(rep);
      appendMsg('bot',html);
    }).catch(function(){appendMsg('bot','⚠️ エラーが発生しました。しばらくしてから再度お試しください。');});
    return;
  }
  if (STAGE==='afterresults') {
    var t2=showTyping();
    callAI(text,[]).then(function(r){
      t2.remove();
      var html='';
      if(r.message) html+=esc(r.message).replace(/\n/g,'<br>');
      if(r.showConsultBtn) html+=consultBtn();
      var rep=r.quickReplies||[];
      if(rep.indexOf('🔍 条件を変えて再検索')<0) rep.push('🔍 条件を変えて再検索');
      html+=quickRepliesHtml(rep);
      appendMsg('bot',html);
    }).catch(function(){appendMsg('bot','⚠️ エラーが発生しました。しばらくしてから再度お試しください。');});
  }
}

// ===== UI部品 =====
function appendMsg(role,html){
  var area=document.getElementById('chat-messages'),div=document.createElement('div');
  div.className='msg '+role;
  if(role==='bot') div.innerHTML='<div class="avatar">🍽️</div><div class="bubble">'+html+'</div>';
  else div.innerHTML='<div class="bubble">'+esc(html)+'</div>';
  area.appendChild(div); scrollBottom(); return div;
}
function addUserMsg(text){
  var area=document.getElementById('chat-messages'),div=document.createElement('div');
  div.className='msg user'; div.innerHTML='<div class="bubble">'+esc(text)+'</div>';
  area.appendChild(div); scrollBottom();
}
function showTyping(){ return appendMsg('bot','<div class="typing-dots"><span></span><span></span><span></span></div>'); }

function jobCard(job){
  var url = job.url || job.applyUrl || '#';

  // 給与表示（salaryMin または salaryText）
  var salaryDisp = '';
  if (job.salaryMin && job.salaryMin > 0) {
    salaryDisp = job.salaryMin.toLocaleString() + '円〜';
  } else if (job.salaryText) {
    salaryDisp = job.salaryText;
  } else if (job.salary) {
    salaryDisp = job.salary;
  }

  // エリア（都道府県＋市区町村）
  var areaDisp = '';
  if (job.city && job.city !== job.pref) {
    areaDisp = (job.pref||job.area||'') + ' ' + job.city;
  } else {
    areaDisp = job.area || job.pref || '';
  }

  var html = '<div class="job-card" onclick="window.open(\''+esc(url)+'\',\'_blank\')">'
    // 求人タイトル
    +'<div class="job-title">'+esc(job.title||job.company||'求人情報')+'</div>'
    // 会社名
    +(job.company?'<div style="font-size:11.5px;color:#888;margin-bottom:6px;">🏢 '+esc(job.company)+'</div>':'')
    // エリア・駅
    +'<div class="job-meta" style="margin-bottom:6px;">'
    +(areaDisp?'<span>📍 '+esc(areaDisp.trim())+'</span>':'')
    +(job.station?'<span>🚉 '+esc(job.station)+'駅</span>':'')
    +(job.access?'<span style="font-size:11px;">（'+esc(job.access)+'）</span>':'')
    +'</div>'
    // タグ行：雇用形態・職種・ジャンル
    +'<div style="display:flex;flex-wrap:wrap;gap:4px;margin-bottom:6px;">'
    +(job.employment?'<span class="tag" style="background:#EEF6FF;border-color:#A0C4FF;color:#1A56C4;">'+esc(job.employment)+'</span>':'')
    +(job.jobType?'<span class="tag">'+esc(job.jobType)+'</span>':'')
    +(job.genre?'<span class="tag" style="background:#F5F0E8;color:#7A5C47;">'+esc(job.genre)+'</span>':'')
    +'</div>'
    // 給与
    +(salaryDisp?'<div style="font-size:13px;font-weight:700;color:#C04A00;margin-bottom:8px;">💴 '+esc(salaryDisp)+'</div>':'')
    // 応募ボタン
    +'<a class="apply-btn" href="'+esc(url)+'" target="_blank" onclick="event.stopPropagation()">詳細・応募する →</a>'
    +'</div>';
  return html;
}

function consultBtn(){
  return '<div style="margin-top:12px;">'
    +'<a href="'+CONSULT_URL+'" target="_blank" style="display:block;background:#3D9970;color:white;text-align:center;padding:13px 20px;border-radius:12px;font-size:14px;font-weight:700;text-decoration:none;box-shadow:0 3px 10px rgba(61,153,112,0.3);">👨‍💼 プロのアドバイザーに無料相談する</a>'
    +'<div style="font-size:11px;color:#888;text-align:center;margin-top:4px;">完全無料・履歴書不要・オンライン対応</div>'
    +'<div style="margin-top:8px;padding:10px 12px;background:#F0FAF5;border-radius:10px;font-size:12px;color:#2D7A5A;">📝 面談後、ご希望の方は会員登録でさらに多くの非公開求人をご確認いただけます</div>'
    +'</div>';
}

function quickRepliesHtml(rep){
  if(!rep||!rep.length) return '';
  return '<div class="quick-replies">'+rep.map(function(r){
    return '<button class="quick-btn" onclick="sendQuick(\''+esc(r)+'\')">'+esc(r)+'</button>';
  }).join('')+'</div>';
}
function sendQuick(t){ document.getElementById('chat-input').value=t; sendMessage(); }

function sendMessage(){
  var input=document.getElementById('chat-input'),btn=document.getElementById('send-btn'),text=input.value.trim();
  if(!text||isSending) return;
  isSending=true; btn.disabled=true; input.value=''; input.style.height='auto';
  if(STAGE==='questioning'){
    addUserMsg(text); isSending=false; btn.disabled=false; input.focus();
  } else {
    appendMsg('user',text); handleMessage(text);
    setTimeout(function(){isSending=false;btn.disabled=false;input.focus();},100);
  }
}

function showWelcome(){
  appendMsg('bot','こんにちは！🍳<br><strong>ペコリッチAI相談</strong>へようこそ。<br><br>'
    +'飲食業界のお仕事を一緒に探しましょう！<br>'
    +'3つの質問でぴったりの求人をご案内します。<br><br>'
    +renderRegionSelector());
}

function esc(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

function sampleJobs(){ return[
  {id:'1',title:'ホールスタッフ（正社員）',company:'イタリアンレストラン 渋谷店',area:'東京・渋谷',jobType:'サービス・ホール',employment:'正社員',salaryText:'月給22〜28万円',applyUrl:''},
  {id:'2',title:'キッチンスタッフ',company:'和食居酒屋 新宿店',area:'東京・新宿',jobType:'キッチン・調理',employment:'アルバイト・パート',salaryText:'時給1,200〜1,400円',applyUrl:''}
];}

document.getElementById('chat-input').addEventListener('input',function(){
  this.style.height='auto'; this.style.height=Math.min(this.scrollHeight,80)+'px';
});
document.getElementById('chat-input').addEventListener('keydown',function(e){
  if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMessage();}
});
document.getElementById('send-btn').addEventListener('click',sendMessage);

// ★ 起動処理（ローディング画面なし・即時表示）
document.getElementById('send-btn').disabled = false;
showWelcome();

// データをバックグラウンドで取得
(function loadData() {
  // v9以降のデータ確認（cityフィールドが空ならキャッシュ無効）
  var cached = localStorage.getItem(CACHE_KEY);
  if (cached) {
    try {
      var cachedData = JSON.parse(cached);
      // cityフィールドがあるデータか確認
      var hasCity = cachedData.length > 0 && cachedData[0].city && cachedData[0].city.trim();
      if (hasCity) {
        JOB_DATA = cachedData;
        setSyncBar('ok', '求人' + JOB_DATA.length + '件（キャッシュ）');
      } else {
        // 古いキャッシュを削除して再取得
        localStorage.removeItem(CACHE_KEY);
        localStorage.removeItem(CACHE_TIME);
        cached = null;
      }
    } catch(e) { JOB_DATA = []; cached = null; }
  }

  var done = false;
  var timer = setTimeout(function() {
    if (!done) {
      done = true;
      if (JOB_DATA.length === 0) {
        JOB_DATA = sampleJobs();
        setSyncBar('error', '⚠️ サンプルデータを表示中');
      }
    }
  }, 5000);

  fetch(WIXBASE + '/getJobs')
    .then(function(r) { return r.json(); })
    .then(function(d) {
      if (done) return;
      done = true;
      clearTimeout(timer);
      if (d.jobs && d.jobs.length) {
        JOB_DATA = d.jobs;
        localStorage.setItem(CACHE_KEY, JSON.stringify(JOB_DATA));
        localStorage.setItem(CACHE_TIME, String(Date.now()));
        setSyncBar('ok', '求人' + JOB_DATA.length + '件 (' + new Date().toLocaleTimeString('ja-JP') + ')');
      }
    })
    .catch(function() {
      if (done) return;
      done = true;
      clearTimeout(timer);
      if (JOB_DATA.length === 0) {
        JOB_DATA = sampleJobs();
        setSyncBar('error', '⚠️ サンプルデータを表示中');
      } else {
        setSyncBar('error', '⚠️ キャッシュ使用中 (' + JOB_DATA.length + '件)');
      }
    });

  setInterval(function() { fetchJobs(true); }, CACHE_MIN * 60 * 1000);
})();

</script>
