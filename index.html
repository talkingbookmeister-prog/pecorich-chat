<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ペコリッチ 求人チャット</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&family=Oswald:wght@600&display=swap" rel="stylesheet">
<style>
:root {
  --primary:#E85D26; --primary-dark:#C04A1B;
  --accent:#F5A623; --bg:#FDF8F3; --panel:#FFFFFF;
  --text:#2D1A0E; --text-light:#7A5C47;
  --border:#EDE0D4; --success:#27AE60;
}
*{margin:0;padding:0;box-sizing:border-box;}
html,body{height:100%;font-family:'Noto Sans JP',sans-serif;background:var(--bg);color:var(--text);overflow:hidden;}
#chat-header{background:var(--primary);padding:12px 16px;display:flex;align-items:center;gap:10px;box-shadow:0 2px 10px rgba(232,93,38,0.35);flex-shrink:0;}
#chat-header .logo{font-family:'Oswald',sans-serif;font-size:18px;color:white;letter-spacing:1px;}
#chat-header .logo span{color:var(--accent);}
#chat-header .status{font-size:11px;color:rgba(255,255,255,0.8);margin-left:auto;display:flex;align-items:center;gap:5px;}
#chat-header .dot{width:7px;height:7px;border-radius:50%;background:#7EE8A2;animation:pulse 2s infinite;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:0.4;}}
#sync-bar{background:#FFF3CD;border-bottom:1px solid #FFD85F;padding:5px 14px;font-size:11px;color:#7A5C47;display:flex;align-items:center;gap:6px;flex-shrink:0;}
#sync-bar.ok{background:#E8F5E9;border-color:#A5D6A7;color:#2E7D32;}
#sync-bar.error{background:#FFEBEE;border-color:#EF9A9A;color:#C62828;}
#chat-wrap{display:flex;flex-direction:column;height:100%;}
#chat-messages{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:12px;scroll-behavior:smooth;}
.msg{display:flex;align-items:flex-end;gap:8px;animation:fadeUp 0.25s ease;}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}
.msg.bot{flex-direction:row;}.msg.user{flex-direction:row-reverse;}
.avatar{width:32px;height:32px;border-radius:50%;background:var(--primary);display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0;}
.bubble{max-width:78%;padding:10px 14px;border-radius:14px;line-height:1.6;font-size:13.5px;}
.msg.bot .bubble{background:var(--panel);border:1px solid var(--border);border-bottom-left-radius:4px;box-shadow:0 4px 20px rgba(232,93,38,0.12);color:var(--text);}
.msg.user .bubble{background:var(--primary);border-bottom-right-radius:4px;color:white;}
.typing-dots span{display:inline-block;width:7px;height:7px;border-radius:50%;background:#C0A898;margin:0 2px;animation:blink 1.2s infinite;}
.typing-dots span:nth-child(2){animation-delay:0.2s;}.typing-dots span:nth-child(3){animation-delay:0.4s;}
@keyframes blink{0%,80%,100%{transform:scale(0.8);opacity:0.5;}40%{transform:scale(1.2);opacity:1;}}
.job-card{background:var(--panel);border:1px solid var(--border);border-radius:10px;padding:12px;margin-top:8px;box-shadow:0 4px 20px rgba(232,93,38,0.12);cursor:pointer;transition:transform 0.15s;}
.job-card:hover{transform:translateY(-2px);}
.job-card .job-title{font-size:13px;font-weight:700;color:var(--primary);margin-bottom:4px;}
.job-card .job-meta{font-size:11.5px;color:var(--text-light);display:flex;flex-wrap:wrap;gap:6px;margin-bottom:6px;}
.tag{background:#FDF8F3;border:1px solid var(--border);border-radius:20px;padding:1px 8px;font-size:11px;color:var(--text-light);}
.tag.salary{background:#FFF8E1;border-color:#FFD54F;color:#E65100;font-weight:700;}
.apply-btn{display:inline-block;background:var(--primary);color:white;padding:5px 14px;border-radius:20px;font-size:12px;font-weight:700;text-decoration:none;margin-top:4px;}
.apply-btn:hover{background:var(--primary-dark);}
.quick-replies{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px;}
.quick-btn{background:white;border:1.5px solid var(--primary);color:var(--primary);border-radius:20px;padding:5px 12px;font-size:12px;font-family:'Noto Sans JP',sans-serif;cursor:pointer;transition:all 0.15s;}
.quick-btn:hover{background:var(--primary);color:white;}
#chat-input-area{border-top:1px solid var(--border);padding:10px 12px;background:var(--panel);display:flex;gap:8px;align-items:flex-end;flex-shrink:0;}
#chat-input{flex:1;border:1.5px solid var(--border);border-radius:22px;padding:9px 16px;font-family:'Noto Sans JP',sans-serif;font-size:13.5px;color:var(--text);background:var(--bg);outline:none;resize:none;max-height:80px;line-height:1.5;transition:border-color 0.2s;}
#chat-input:focus{border-color:var(--primary);}
#chat-input::placeholder{color:#C0A898;}
#send-btn{width:40px;height:40px;border-radius:50%;background:var(--primary);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:background 0.15s,transform 0.1s;}
#send-btn:hover{background:var(--primary-dark);}#send-btn:active{transform:scale(0.92);}
#send-btn svg{fill:white;width:18px;height:18px;}
#send-btn:disabled{background:#ddd;cursor:not-allowed;}
#loading-screen{position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;z-index:999;}
#loading-screen .spin{width:36px;height:36px;border:3px solid var(--border);border-top-color:var(--primary);border-radius:50%;animation:spin 0.8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
#loading-screen p{font-size:13px;color:var(--text-light);}
</style>
</head>
<body>
<div id="loading-screen"><div class="spin"></div><p>求人データを読み込み中…</p></div>
<div id="chat-wrap" style="display:none;">
  <div id="chat-header">
    <div class="logo">PECO<span>RICH</span></div>
    <div style="font-size:12px;color:rgba(255,255,255,0.9);margin-left:4px;">求人AI検索</div>
    <div class="status"><span class="dot"></span><span id="job-count-label">読込中…</span></div>
  </div>
  <div id="sync-bar">🔄 <span id="sync-msg">求人データを確認中…</span></div>
  <div id="chat-messages"></div>
  <div id="chat-input-area">
    <textarea id="chat-input" placeholder="例：渋谷でホールスタッフを探しています" rows="1"></textarea>
    <button id="send-btn" disabled>
      <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
    </button>
  </div>
</div>
<script>
var AI_ENDPOINT = "https://lively-math-3076.talkingbookmeister.workers.dev";
var WIXBASE     = "https://www.jointlab.jp/_functions";
var CACHE_KEY   = "pecorich_jobs_cache";
var CACHE_TIME  = "pecorich_jobs_time";
var CACHE_MIN   = 60;
var JOB_DATA    = [];
var isSending   = false;

/* ===== 求人データ取得 ===== */
function fetchJobs(force) {
  var now      = Date.now();
  var cached   = localStorage.getItem(CACHE_KEY);
  var cachedAt = parseInt(localStorage.getItem(CACHE_TIME) || "0");
  var ageMin   = (now - cachedAt) / 60000;

  if (!force && cached && ageMin < CACHE_MIN) {
    JOB_DATA = JSON.parse(cached);
    setSyncBar("ok", "求人データ取得済み（" + Math.floor(ageMin) + "分前に更新）");
    return Promise.resolve(JOB_DATA);
  }

  setSyncBar("", "最新求人データを取得中…");

  return fetch(WIXBASE + "/getJobs")
    .then(function(r) { return r.json(); })
    .then(function(d) {
      JOB_DATA = d.jobs || [];
      localStorage.setItem(CACHE_KEY, JSON.stringify(JOB_DATA));
      localStorage.setItem(CACHE_TIME, String(Date.now()));
      setSyncBar("ok", "求人" + JOB_DATA.length + "件 (" + new Date().toLocaleTimeString("ja-JP") + ")");
      return JOB_DATA;
    })
    .catch(function() {
      if (cached) {
        JOB_DATA = JSON.parse(cached);
        setSyncBar("error", "⚠️ キャッシュ使用中 (" + JOB_DATA.length + "件)");
      } else {
        JOB_DATA = sampleJobs();
        setSyncBar("error", "⚠️ サンプルデータを表示中");
      }
      return JOB_DATA;
    });
}

function setSyncBar(state, text) {
  document.getElementById("sync-bar").className = state;
  document.getElementById("sync-msg").textContent = text;
  document.getElementById("job-count-label").textContent =
    state === "ok" ? "求人 " + JOB_DATA.length + "件" : "—";
}

/* ===== ユーザー希望に合う求人を絞り込む（ローカル処理） ===== */
function filterJobs(userMessage) {
  var msg = userMessage.toLowerCase();
  var results = JOB_DATA.filter(function(j) {
    var text = [j.title, j.company, j.area, j.pref, j.city, j.station,
                j.jobType, j.employment, j.features, j.genre].join(" ").toLowerCase();
    var words = msg.replace(/[。、！？]/g, " ").split(/\s+/).filter(Boolean);
    return words.some(function(w) { return w.length >= 2 && text.indexOf(w) >= 0; });
  });
  // マッチしなければランダムで返す
  if (results.length === 0) results = JOB_DATA.slice(0, 20);
  return results.slice(0, 20);
}

/* ===== AI呼び出し（絞り込み済みデータのみ送信） ===== */
function callAI(userMessage) {
  var matched = filterJobs(userMessage);

  // 送信データを軽量化（必要最小限のフィールドのみ）
  var jobList = matched.map(function(j) {
    return {
      id:    j.id,
      title: j.title,
      company: j.company,
      area:  j.area || j.pref,
      jobType: j.jobType,
      employment: j.employment,
      salary: j.salaryText,
      station: j.station,
      features: j.features,
      url:   j.applyUrl
    };
  });

  var system = "あなたはペコリッチ（飲食業界専門求人サイト）の求人検索AIアシスタントです。"
    + "求職者の希望に合う求人を以下のデータから最大3件提案してください。\n\n"
    + "求人データ:\n" + JSON.stringify(jobList) + "\n\n"
    + "必ず以下のJSON形式のみで返してください（前後に文字を追加しない）:\n"
    + '{"message":"一言コメント（100字以内）","jobs":[{"id":"","title":"","company":"","area":"","jobType":"","employment":"","salary":"","url":""}],"quickReplies":["選択肢1","選択肢2","選択肢3"]}';

  return fetch(AI_ENDPOINT, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      model: "claude-haiku-4-5-20251001",
      max_tokens: 1000,
      system: system,
      messages: [{ role: "user", content: userMessage }]
    })
  })
  .then(function(r) {
    if (!r.ok) throw new Error("HTTP " + r.status);
    return r.json();
  })
  .then(function(data) {
    var raw = (data.content && data.content[0] && data.content[0].text) || "";
    if (!raw) throw new Error("empty response");
    var clean = raw.replace(/```json|```/g, "").trim();
    try {
      return JSON.parse(clean);
    } catch(e) {
      return { message: raw.slice(0, 200), jobs: [], quickReplies: [] };
    }
  });
}

/* ===== メッセージ表示 ===== */
function appendMsg(role, html) {
  var area = document.getElementById("chat-messages");
  var div  = document.createElement("div");
  div.className = "msg " + role;
  if (role === "bot") {
    div.innerHTML = '<div class="avatar">🍽️</div><div class="bubble">' + html + '</div>';
  } else {
    div.innerHTML = '<div class="bubble">' + esc(html) + '</div>';
  }
  area.appendChild(div);
  area.scrollTop = area.scrollHeight;
  return div;
}

function showTyping() {
  return appendMsg("bot", '<div class="typing-dots"><span></span><span></span><span></span></div>');
}

function jobCard(job) {
  var url = job.url || "#";
  return '<div class="job-card" onclick="window.open(\'' + esc(url) + '\',\'_blank\')">'
    + '<div class="job-title">🏪 ' + esc(job.title || job.company || "求人情報") + '</div>'
    + '<div class="job-meta">'
    + (job.area ? '<span>📍 ' + esc(job.area) + '</span>' : '')
    + (job.jobType ? '<span>👤 ' + esc(job.jobType) + '</span>' : '')
    + '</div>'
    + '<div style="display:flex;flex-wrap:wrap;gap:4px;margin-bottom:6px;">'
    + (job.employment ? '<span class="tag">' + esc(job.employment) + '</span>' : '')
    + (job.salary ? '<span class="tag salary">💴 ' + esc(job.salary) + '</span>' : '')
    + '</div>'
    + '<a class="apply-btn" href="' + esc(url) + '" target="_blank" onclick="event.stopPropagation()">応募する →</a>'
    + '</div>';
}

function quickReplies(replies) {
  if (!replies || !replies.length) return "";
  return '<div class="quick-replies">'
    + replies.map(function(r) {
        return '<button class="quick-btn" onclick="sendQuick(\'' + esc(r) + '\')">' + esc(r) + '</button>';
      }).join("")
    + '</div>';
}

function sendQuick(text) {
  document.getElementById("chat-input").value = text;
  sendMessage();
}

/* ===== 送信 ===== */
function sendMessage() {
  var input = document.getElementById("chat-input");
  var btn   = document.getElementById("send-btn");
  var text  = input.value.trim();
  if (!text || isSending) return;
  isSending = true;
  btn.disabled = true;
  input.value = "";
  input.style.height = "auto";
  appendMsg("user", text);
  var typing = showTyping();

  callAI(text)
    .then(function(result) {
      typing.remove();
      var html = "";
      if (result.message) html += esc(result.message).replace(/\n/g, "<br>");
      if (result.jobs && result.jobs.length) html += result.jobs.map(jobCard).join("");
      if (result.quickReplies && result.quickReplies.length) html += quickReplies(result.quickReplies);
      appendMsg("bot", html || "条件に合う求人が見つかりませんでした。別の条件で試してみてください。");
    })
    .catch(function(e) {
      typing.remove();
      appendMsg("bot", "⚠️ エラーが発生しました。しばらくしてから再度お試しください。");
      console.error("callAI error:", e);
    })
    .finally(function() {
      isSending = false;
      btn.disabled = false;
      input.focus();
    });
}

/* ===== ウェルカム ===== */
function showWelcome() {
  var html = "こんにちは！🍳<br><strong>ペコリッチ</strong>の求人AIアシスタントです。<br><br>"
    + "希望のお仕事を自由に教えてください。<br>エリア・職種・給与・シフトなど、なんでもOKです！"
    + quickReplies(["🗺️ エリアから探す", "👔 職種から探す", "💴 給与で絞り込む", "🕐 シフト重視で探す"]);
  appendMsg("bot", html);
}

function esc(s) {
  return String(s)
    .replace(/&/g,"&amp;").replace(/</g,"&lt;")
    .replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}

function sampleJobs() {
  return [
    {id:"1",title:"ホールスタッフ（正社員）",company:"イタリアンレストラン 渋谷店",area:"東京・渋谷",jobType:"ホールスタッフ",employment:"正社員",salaryText:"月給22〜28万円",applyUrl:""},
    {id:"2",title:"調理補助スタッフ",company:"和食居酒屋 新宿店",area:"東京・新宿",jobType:"キッチン",employment:"アルバイト",salaryText:"時給1,200〜1,400円",applyUrl:""},
  ];
}

/* ===== 初期化 ===== */
document.getElementById("chat-input").addEventListener("input", function() {
  this.style.height = "auto";
  this.style.height = Math.min(this.scrollHeight, 80) + "px";
});
document.getElementById("chat-input").addEventListener("keydown", function(e) {
  if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); sendMessage(); }
});
document.getElementById("send-btn").addEventListener("click", sendMessage);

fetchJobs(false).then(function() {
  document.getElementById("loading-screen").style.display = "none";
  document.getElementById("chat-wrap").style.display = "flex";
  document.getElementById("send-btn").disabled = false;
  showWelcome();
  setInterval(function() { fetchJobs(true); }, CACHE_MIN * 60 * 1000);
});
</script>
</body>
</html>
